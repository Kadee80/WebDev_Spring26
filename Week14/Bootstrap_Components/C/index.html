<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modal Wizard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h1>Bootstrap Modals and Util Classes</h1>
    <div class="container mt-5">
      <div
        class="p-3 bg-warning-subtle text-success border border-5 border-danger rounded-5"
      >
        Example element with utility classes applied
      </div>
    </div>

    <div class="container mt-5">
      <button
        type="button"
        class="btn btn-lg btn-outline-dark border-2"
        data-bs-toggle="modal"
        data-bs-target="#wizard"
      >
        Open Wizard
      </button>
    </div>

    <!-- Modal 1 #wizard -->
    <div
      class="modal fade"
      id="wizard"
      aria-hidden="true"
      aria-labelledby="wizardLabel"
      tabindex="-1"
      data-bs-backdrop="static"
      data-bs-keyboard="false"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="wizardLabel">Modal 1</h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            Show a second modal and hide this one with the button below.
          </div>
          <div class="modal-footer">
            <button
              class="btn btn-primary"
              data-bs-target="#wizard-2"
              data-bs-toggle="modal"
            >
              Next
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- End modal 1 -->
    <!-- Begin Modal 2 #wizard-2 -->
    <div
      class="modal fade"
      id="wizard-2"
      aria-hidden="true"
      aria-labelledby="wizard-2-label"
      tabindex="-1"
      data-bs-backdrop="static"
      data-bs-keyboard="false"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="wizard-2-label">Modal 2</h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            Hide this modal and show the first with the button below.
          </div>
          <div class="modal-footer">
            <button
              class="btn btn-primary"
              data-bs-target="#wizard"
              data-bs-toggle="modal"
            >
              Previous
            </button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
