<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <h1>Modals and Util Classes</h1>
    <div class="container mt-5">
      <div
        class="p-3 bg-warning-subtle text-success border border-5 border-danger-subtle rounded-5"
      >
        Example element with utility classes!
      </div>
    </div>

    <div class="container mt-5">
      <button
        class="btn btn-lg btn-outline-dark border-3"
        data-bs-toggle="modal"
        data-bs-target="#wizard"
      >
        Open Step Wizard
      </button>
    </div>

    <!-- Modal 1 #wizard -->
    <div
      class="modal fade"
      id="wizard"
      aria-labelledby="wizardLabel"
      tabindex="-1"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="wizardLabel">Modal 1</h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            Show a second modal and hide this one with the button below.
          </div>
          <div class="modal-footer">
            <button
              class="btn btn-primary"
              data-bs-target="#wizard-2"
              data-bs-toggle="modal"
            >
              Open second modal
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- Modal 2 #wizard-2 -->
    <div
      class="modal fade"
      id="wizard-2"
      aria-hidden="true"
      aria-labelledby="wizard-label-2"
      tabindex="-1"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="wizard-label-2">Modal 2</h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            Hide this modal and show the first with the button below.
          </div>
          <div class="modal-footer">
            <button
              class="btn btn-primary"
              data-bs-target="#wizard"
              data-bs-toggle="modal"
            >
              Prev
            </button>
            <button
              class="btn btn-primary"
              data-bs-target="#wizard-3"
              data-bs-toggle="modal"
            >
              Next
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- Modal 3 #wizard-3 -->
    <div
      class="modal fade"
      id="wizard-3"
      aria-hidden="true"
      aria-labelledby="wizard-label-3"
      tabindex="-1"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="wizard-label-3">Modal 3</h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            Hide this modal and show the first with the button below.
          </div>
          <div class="modal-footer">
            <button
              class="btn btn-primary"
              data-bs-target="#wizard-2"
              data-bs-toggle="modal"
            >
              Prev
            </button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
